<section class="flex min-h-[calc(100dvh-7rem)] flex-col gap-4">
  <div class="flex flex-col gap-1">
    <h1 class="text-xl font-semibold">Career Bot</h1>
    <p class="text-sm text-slate-400">
      Ask career questions based on your job goals, skills, and preferences.
    </p>
  </div>

  <div class="flex min-h-0 flex-1 flex-col rounded-xl border border-slate-800 bg-slate-950">
    <div class="min-h-0 flex-1 space-y-3 overflow-auto p-4">
      @for (m of messages(); track $index) {
        <div
          class="flex"
          [class.justify-end]="m.role === 'user'"
          [class.justify-start]="m.role === 'bot'"
        >
          <div
            class="max-w-[min(42rem,85%)] whitespace-pre-wrap rounded-xl px-4 py-3 text-sm leading-6"
            [class.bg-indigo-600]="m.role === 'user'"
            [class.text-white]="m.role === 'user'"
            [class.bg-slate-900]="m.role === 'bot'"
            [class.text-slate-200]="m.role === 'bot'"
          >
            {{ m.text }}
          </div>
        </div>
      }

      @if (loading()) {
        <div class="flex justify-start">
          <div class="rounded-xl bg-slate-900 px-4 py-3 text-sm text-slate-400">
            Thinking...
          </div>
        </div>
      }
    </div>

    <div *ngIf="error()" class="border-t border-amber-900/60 bg-amber-950/30 px-4 py-3 text-sm text-amber-200">
      {{ error() }}
    </div>

    <form class="flex flex-col gap-3 border-t border-slate-800 p-4 sm:flex-row" (ngSubmit)="ask()">
      <textarea
        class="min-h-24 flex-1 resize-none rounded-lg border border-slate-800 bg-slate-900 px-3 py-2 text-sm text-slate-100 outline-none placeholder:text-slate-500 focus:border-indigo-500 sm:min-h-12"
        maxlength="2000"
        name="careerQuestion"
        placeholder="Ask about interviews, resumes, skills, salary negotiation..."
        [ngModel]="draft()"
        (ngModelChange)="draft.set($event)"
      ></textarea>

      <button
        type="submit"
        class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 disabled:cursor-not-allowed disabled:opacity-60 sm:self-end"
        [disabled]="loading() || !draft().trim()"
      >
        Send
      </button>
    </form>
  </div>
</section>

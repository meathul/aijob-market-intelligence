<p>insights-page works!</p><section class="space-y-4">
  <div>
    <h1 class="text-xl font-semibold">AI Insights</h1>
    <p class="mt-1 text-sm text-slate-400">
      Operational insights from your ingestion pipeline (last {{ days() }} days).
    </p>
  </div>

  <div class="rounded-xl border border-slate-800 bg-slate-950 p-4">
    <div class="flex items-center justify-between">
      <div class="text-sm font-medium text-slate-100">Daily ingested jobs</div>
      <div class="text-xs text-slate-400">Total: {{ total() }}</div>
    </div>

    <div class="mt-3 overflow-auto">
      <table class="min-w-full text-sm">
        <thead>
          <tr class="text-left text-slate-400">
            <th class="py-2 pr-4 font-medium">Day</th>
            <th class="py-2 pr-4 font-medium">Count</th>
          </tr>
        </thead>
        <tbody>
          @for (p of points(); track p.day) {
            <tr class="border-t border-slate-800/70">
              <td class="py-2 pr-4 text-slate-200">{{ p.day }}</td>
              <td class="py-2 pr-4 text-slate-100">{{ p.count }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    @if (points().length === 0) {
      <div class="pt-3 text-sm text-slate-400">No data yet.</div>
    }
  </div>
</section>

<div class="min-h-dvh bg-transparent text-slate-100 flex items-center justify-center p-6 select-none relative overflow-hidden">
  <!-- Glowing subtle gradient circles in background for premium styling -->
  <div class="absolute -top-40 -left-40 h-96 w-96 rounded-full bg-indigo-600/10 blur-3xl"></div>
  <div class="absolute -bottom-40 -right-40 h-96 w-96 rounded-full bg-violet-600/10 blur-3xl"></div>

  <div class="mx-auto w-full max-w-md">
    <!-- Logged Out Card -->
    <div class="rounded-2xl border border-slate-900 bg-slate-900/40 backdrop-blur-md p-8 shadow-2xl shadow-indigo-500/5 text-center flex flex-col items-center">
      
      <!-- Brand Logo Header -->
      <div class="mb-8 flex items-center gap-3">
        <div class="relative flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 shadow-md">
          <svg class="h-5.5 w-5.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <div class="flex flex-col text-left">
          <span class="text-xxs font-bold uppercase tracking-widest text-indigo-400">AI Job</span>
          <span class="text-sm font-extrabold tracking-tight text-slate-200">Market Intelligence</span>
        </div>
      </div>

      <!-- Security Logout Badge with Glowing Rings -->
      <div class="relative flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-600/10 border border-indigo-500/20 text-indigo-400 mb-6 shadow-inner">
        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.952 11.952 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
        <!-- Ping ripple animation -->
        <span class="absolute -inset-1 rounded-2xl bg-indigo-500/5 animate-pulse"></span>
      </div>

      <!-- Title & Support Description -->
      <h2 class="text-xl font-bold tracking-tight text-slate-100 mb-2">Logged Out Successfully</h2>
      <p class="text-sm text-slate-400 leading-relaxed mb-8 max-w-xs">
        You have been securely signed out. All local cache and session tokens have been cleared from this browser.
      </p>

      <!-- Action button to log back in -->
      <button
        type="button"
        routerLink="/auth/login"
        class="w-full flex items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-3 text-sm font-bold text-white hover:bg-indigo-500 hover:shadow-lg hover:shadow-indigo-500/10 transition-all duration-200"
      >
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Sign In Again</span>
      </button>

      <!-- Support details link -->
      <div class="mt-6 text-xxs text-slate-600 font-medium">
        Secured Session · Portal version 1.0.0
      </div>
    </div>
  </div>
</div>

<section class="space-y-4">
  <div class="flex items-end justify-between gap-4">
    <div>
      <h1 class="text-xl font-semibold">Jobs</h1>
      <p class="mt-1 text-sm text-slate-400">
        Showing <span class="text-slate-200">{{ jobs().length }}</span> jobs.
      </p>
    </div>

    <div class="flex items-center gap-2">
      <button
        type="button"
        class="rounded-lg px-3 py-2 text-sm font-medium"
        [class.bg-slate-800]="mode() === 'recommended'"
        [class.text-slate-100]="mode() === 'recommended'"
        [class.text-slate-300]="mode() !== 'recommended'"
        (click)="setMode('recommended')"
      >
        Recommended
      </button>

      <button
        type="button"
        class="rounded-lg px-3 py-2 text-sm font-medium"
        [class.bg-slate-800]="mode() === 'all'"
        [class.text-slate-100]="mode() === 'all'"
        [class.text-slate-300]="mode() !== 'all'"
        (click)="setMode('all')"
      >
        All Jobs
      </button>

      <button
        type="button"
        class="rounded-lg bg-indigo-600 px-3 py-2 text-sm font-medium text-white hover:bg-indigo-500"
        (click)="refresh()"
      >
        Refresh
      </button>
    </div>
  </div>

  <div *ngIf="error()" class="rounded-xl border border-amber-900/60 bg-amber-950/30 p-3 text-sm text-amber-200">
    {{ error() }}
  </div>

  <div
    *ngIf="prefsWarning()"
    class="rounded-xl border border-indigo-900/60 bg-indigo-950/30 p-3 text-sm text-indigo-200"
  >
    {{ prefsWarning() }}
    <a routerLink="/onboarding" class="ml-2 underline">Set up profile</a>
  </div>

  <div class="rounded-xl border border-slate-800 bg-slate-950 p-4">
    <app-jobs-filters (changed)="onFiltersChanged($event)" />
  </div>

  <p *ngIf="mode() === 'recommended'" class="text-sm text-slate-400">
    Ranked for your saved profile. Switch to All Jobs to use manual filters.
  </p>

  <app-jobs-table [jobs]="jobs()" />
</section>

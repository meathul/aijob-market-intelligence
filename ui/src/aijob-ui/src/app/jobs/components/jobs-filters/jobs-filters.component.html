<div class="flex flex-col gap-4">
  <!-- Search Bar -->
  <div class="relative flex items-center rounded-xl border border-slate-800 bg-slate-900/40 px-3.5 py-2.5 transition-all duration-300 hover:border-slate-700 focus-within:border-indigo-500 focus-within:ring-4 focus-within:ring-indigo-500/10">
    <svg class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
    <input
      type="text"
      class="ml-3 w-full bg-transparent text-sm text-slate-200 placeholder-slate-500 outline-none focus:outline-none focus:ring-0"
      placeholder="Search role, company, or key skill..."
      [ngModel]="state().query"
      (ngModelChange)="onQueryChange($event)"
    />
    <button
      *ngIf="state().query"
      type="button"
      class="ml-2 rounded-full p-1 text-slate-500 hover:bg-slate-800 hover:text-slate-300 transition-colors"
      (click)="onQueryChange('')"
    >
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Filters Row -->
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-12 items-center">
    <!-- Location Select -->
    <div class="sm:col-span-4 flex flex-col gap-1.5">
      <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Location</label>
      <div class="relative flex items-center rounded-xl border border-slate-800 bg-slate-900/40 px-3 py-2">
        <select
          class="w-full bg-transparent text-sm text-slate-200 outline-none border-none cursor-pointer focus:ring-0"
          [value]="state().location"
          (change)="onLocationChange($any($event.target).value)"
        >
          <option *ngFor="let loc of locations" [value]="loc" class="bg-slate-950 text-slate-200">
            {{ loc }}
          </option>
        </select>
      </div>
    </div>

    <!-- Remote Toggle -->
    <div class="sm:col-span-3 flex items-center justify-between sm:justify-start gap-4 pt-5">
      <button
        type="button"
        class="flex items-center gap-2.5 rounded-xl border px-4 py-2 text-sm font-medium transition-all duration-200"
        [ngClass]="state().remoteOnly ? 'bg-indigo-600/15 border-indigo-500/30 text-indigo-400' : 'bg-transparent border-slate-800 text-slate-400 hover:border-slate-700'"
        (click)="onRemoteOnlyChange(!state().remoteOnly)"
      >
        <span class="relative flex h-2 w-2">
          <span 
            class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"
            [class.bg-indigo-400]="state().remoteOnly"
            [class.bg-slate-500]="!state().remoteOnly"
          ></span>
          <span 
            class="relative inline-flex rounded-full h-2 w-2"
            [class.bg-indigo-500]="state().remoteOnly"
            [class.bg-slate-600]="!state().remoteOnly"
          ></span>
        </span>
        Remote Only
      </button>
    </div>

    <!-- Salary Filter Sliders (Only visible in 'all' jobs mode) -->
    <div *ngIf="mode === 'all'" class="sm:col-span-5 flex flex-col gap-1.5">
      <div class="flex items-center justify-between">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Salary Range</label>
        <span class="text-xs font-bold text-indigo-400">
          {{ state().minSalary === 0 && state().maxSalary === 250000 
            ? 'Any' 
            : (state().minSalary === 0 ? '$0' : '$' + (state().minSalary / 1000) + 'k') + 
              ' - ' + 
              (state().maxSalary === 250000 ? '$250k+' : '$' + (state().maxSalary / 1000) + 'k') 
          }}
        </span>
      </div>
      <div class="flex flex-col gap-1 pt-1">
        <!-- Min Slider -->
        <div class="flex items-center gap-2">
          <span class="text-[10px] text-slate-500 font-semibold w-6">Min</span>
          <input
            type="range"
            min="0"
            max="250000"
            step="10000"
            [value]="state().minSalary"
            (input)="onMinSalaryChange($any($event.target).value)"
            class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500 hover:accent-indigo-400 transition-colors"
          />
        </div>
        <!-- Max Slider -->
        <div class="flex items-center gap-2">
          <span class="text-[10px] text-slate-500 font-semibold w-6">Max</span>
          <input
            type="range"
            min="0"
            max="250000"
            step="10000"
            [value]="state().maxSalary"
            (input)="onMaxSalaryChange($any($event.target).value)"
            class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500 hover:accent-indigo-400 transition-colors"
          />
        </div>
      </div>
    </div>
  </div>
</div>

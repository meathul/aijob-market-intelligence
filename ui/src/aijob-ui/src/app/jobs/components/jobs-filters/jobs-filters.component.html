<p>jobs-filters works!</p>
<div class="grid grid-cols-1 gap-3 md:grid-cols-12">
  <mat-form-field class="md:col-span-6" appearance="outline">
    <mat-label>Search</mat-label>
    <input
      matInput
      placeholder="Role, company, skill…"
      [ngModel]="state().query"
      (ngModelChange)="onQueryChange($event)"
    />
  </mat-form-field>

  <mat-form-field class="md:col-span-4" appearance="outline">
    <mat-label>Location</mat-label>
    <mat-select
      [value]="state().location"
      (selectionChange)="onLocationChange($event.value)"
    >
      @for (loc of locations; track loc) {
        <mat-option [value]="loc">{{ loc }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <div class="md:col-span-2 flex items-center">
    <mat-slide-toggle
      [checked]="state().remoteOnly"
      (change)="onRemoteOnlyChange($event.checked)"
    >
      Remote
    </mat-slide-toggle>
  </div>
</div>

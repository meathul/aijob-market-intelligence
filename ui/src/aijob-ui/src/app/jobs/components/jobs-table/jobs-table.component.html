<div class="overflow-auto rounded-xl border border-slate-800 bg-slate-950">
  <table mat-table [dataSource]="jobs" class="min-w-full">
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Title </th>
      <td mat-cell *matCellDef="let row">
        <div class="font-medium text-slate-100">
          {{ row.title }}
          <span *ngIf="row.url" class="ml-2 text-xs text-slate-500">↗</span>
        </div>
        <div *ngIf="row.matchLabel" class="mt-0.5 text-xs text-indigo-300/90">
          {{ row.matchLabel }}
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="company">
      <th mat-header-cell *matHeaderCellDef> Company </th>
      <td mat-cell *matCellDef="let row" class="text-slate-200">
        {{ row.company }}
      </td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef> Location </th>
      <td mat-cell *matCellDef="let row" class="text-slate-200">
        {{ row.location }}
      </td>
    </ng-container>

    <ng-container matColumnDef="posted">
      <th mat-header-cell *matHeaderCellDef> Posted </th>
      <td mat-cell *matCellDef="let row" class="text-slate-400">
        {{ row.posted }}
      </td>
    </ng-container>

    <ng-container matColumnDef="salary">
      <th mat-header-cell *matHeaderCellDef> Salary </th>
      <td mat-cell *matCellDef="let row" class="text-slate-200">
        {{ row.salary || '—' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="skills">
      <th mat-header-cell *matHeaderCellDef> Skills </th>
      <td mat-cell *matCellDef="let row">
        <mat-chip-set>
          @for (s of row.skills ?? []; track s) {
            <mat-chip>{{ s }}</mat-chip>
          }
        </mat-chip-set>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      class="cursor-pointer hover:bg-slate-900/50"
      (click)="openJob(row)"
    ></tr>
  </table>
</div>

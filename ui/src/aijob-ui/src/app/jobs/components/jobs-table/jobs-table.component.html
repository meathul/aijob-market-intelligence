@if (jobs.length === 0) {
  <div class="rounded-xl border border-slate-800 bg-slate-950 p-6 text-sm text-slate-400">
    No jobs match the current view.
  </div>
} @else {
  <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
    @for (row of jobs; track row.id) {
    <article
      class="job-card cursor-pointer rounded-xl border border-slate-800 bg-slate-950 p-4 transition hover:border-slate-700 hover:bg-slate-900/60"
      (click)="openJob(row)"
    >
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <h2 class="text-base font-semibold leading-6 text-slate-100">
            {{ row.title }}
            <span *ngIf="row.url" class="ml-1 text-xs text-slate-500">↗</span>
          </h2>
          <div *ngIf="row.matchLabel" class="mt-1 text-xs text-indigo-300/90">
            {{ row.matchLabel }}
          </div>
        </div>

        <div class="shrink-0 text-right text-xs text-slate-400">
          {{ row.posted }}
        </div>
      </div>

      <div class="mt-4 grid gap-3 text-sm">
        <div>
          <div class="text-xs uppercase text-slate-500">Company</div>
          <div class="mt-1 font-medium text-slate-200">{{ row.company }}</div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <div class="text-xs uppercase text-slate-500">Location</div>
            <div class="mt-1 text-slate-200">{{ row.location }}</div>
          </div>

          <div>
            <div class="text-xs uppercase text-slate-500">Salary</div>
            <div class="mt-1 text-slate-200">{{ row.salary || '—' }}</div>
          </div>
        </div>
      </div>

      <div *ngIf="!isAdmin()" class="mt-4 flex items-center justify-end animate-fade-in" (click)="$event.stopPropagation()">
        @if (isApplied(row.id)) {
          <button
            type="button"
            (click)="unapply(row.id)"
            class="flex items-center gap-1.5 rounded-lg border border-emerald-500/30 bg-emerald-950/20 px-3 py-1.5 text-xs font-semibold text-emerald-400 transition hover:bg-emerald-900/20 hover:border-emerald-500/50"
            title="Click to withdraw application"
          >
            <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
            Applied
          </button>
        } @else {
          <button
            type="button"
            (click)="apply(row)"
            class="rounded-lg bg-indigo-600 px-4 py-1.5 text-xs font-semibold text-white shadow-sm transition hover:bg-indigo-500 hover:scale-[1.02] active:scale-[0.98]"
          >
            Apply
          </button>
        }
      </div>
    </article>
    }
  </div>
}

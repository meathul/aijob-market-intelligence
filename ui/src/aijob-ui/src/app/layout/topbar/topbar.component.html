<div class="flex items-center justify-between px-5 py-4 border-b border-slate-900/60 bg-slate-950/45 select-none">
  <!-- Left Title & Breadcrumbs -->
  <div class="flex flex-col">
    <div class="flex items-center gap-1.5 text-xxs font-bold uppercase tracking-wider text-slate-500">
      <span>Portal</span>
      <svg class="h-3 w-3 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
      </svg>
      <span class="text-indigo-400/80">{{ title() }}</span>
    </div>
    <h1 class="text-lg font-bold text-slate-100 tracking-tight mt-0.5">{{ title() }}</h1>
  </div>

  <!-- Right Actions -->
  <div class="flex items-center gap-3">
    <button
      type="button"
      class="flex items-center gap-2 rounded-xl border border-slate-800 bg-slate-900/40 px-3.5 py-2 text-xs font-semibold text-slate-300 hover:bg-slate-800 hover:text-white transition-all duration-200"
    >
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
      <span>Export</span>
    </button>
    
    <button
      type="button"
      class="flex items-center gap-2 rounded-xl bg-indigo-600 px-3.5 py-2 text-xs font-semibold text-white hover:bg-indigo-500 shadow-md shadow-indigo-500/10 transition-all duration-200"
    >
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.2 8H18.5" />
      </svg>
      <span>Refresh</span>
    </button>

    <!-- Divider -->
    <div class="h-6 w-px bg-slate-900 mx-1"></div>

    <!-- Notification Bell -->
    <div class="relative flex h-9 w-9 items-center justify-center rounded-xl border border-slate-800 bg-slate-900/40 text-slate-400 hover:bg-slate-800 hover:text-slate-200 cursor-pointer transition-colors">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
      <span class="absolute top-2 right-2.5 h-1.5 w-1.5 rounded-full bg-indigo-500"></span>
    </div>
  </div>
</div>

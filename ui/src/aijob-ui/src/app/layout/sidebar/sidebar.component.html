<div class="flex h-dvh flex-col p-5 bg-slate-950/40 select-none">
  <!-- Brand Header -->
  <div class="mb-8 flex items-center gap-3">
    <!-- SVG Premium Geometric Logo -->
    <div class="relative flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 shadow-lg shadow-indigo-500/30">
      <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
      <!-- Small background decoration glow -->
      <span class="absolute -inset-0.5 -z-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 opacity-30 blur"></span>
    </div>
    
    <div class="flex flex-col">
      <span class="text-xs font-bold uppercase tracking-widest text-indigo-400">AI Job</span>
      <span class="text-base font-extrabold tracking-tight bg-gradient-to-r from-slate-100 to-slate-300 bg-clip-text text-transparent">Market Intel</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 space-y-6 overflow-y-auto pr-1">
    <!-- Core Section -->
    <div class="space-y-1.5">
      <div class="px-3 text-xxs font-bold uppercase tracking-widest text-slate-500">Core</div>
      
      <!-- Dashboard Link -->
      <a
        class="flex items-center gap-3 rounded-xl border border-transparent px-3.5 py-2.5 text-sm font-medium text-slate-400 hover:bg-slate-900/40 hover:text-slate-200 transition-all duration-200"
        routerLink="/dashboard"
        routerLinkActive="bg-indigo-600/10 border-indigo-500/20 text-indigo-400 font-semibold"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
        </svg>
        <span>Dashboard</span>
      </a>

      <!-- Jobs Link -->
      <a
        class="flex items-center gap-3 rounded-xl border border-transparent px-3.5 py-2.5 text-sm font-medium text-slate-400 hover:bg-slate-900/40 hover:text-slate-200 transition-all duration-200"
        routerLink="/jobs"
        routerLinkActive="bg-indigo-600/10 border-indigo-500/20 text-indigo-400 font-semibold"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        <span>Jobs</span>
      </a>
    </div>

    <!-- Analytics Section -->
    <div class="space-y-1.5">
      <div class="px-3 text-xxs font-bold uppercase tracking-widest text-slate-500">Analytics</div>

      <!-- Skills Link -->
      <a
        class="flex items-center gap-3 rounded-xl border border-transparent px-3.5 py-2.5 text-sm font-medium text-slate-400 hover:bg-slate-900/40 hover:text-slate-200 transition-all duration-200"
        routerLink="/skills"
        routerLinkActive="bg-indigo-600/10 border-indigo-500/20 text-indigo-400 font-semibold"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
        </svg>
        <span>Skills</span>
      </a>

      <!-- Salary Link -->
      <a
        class="flex items-center gap-3 rounded-xl border border-transparent px-3.5 py-2.5 text-sm font-medium text-slate-400 hover:bg-slate-900/40 hover:text-slate-200 transition-all duration-200"
        routerLink="/salary"
        routerLinkActive="bg-indigo-600/10 border-indigo-500/20 text-indigo-400 font-semibold"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-20c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12S6.477 2 12 2z" />
        </svg>
        <span>Salary Analytics</span>
      </a>

      <!-- Admin Reports (Admin Only) -->
      <a
        *ngIf="isAdmin()"
        class="flex items-center gap-3 rounded-xl border border-transparent px-3.5 py-2.5 text-sm font-medium text-slate-400 hover:bg-slate-900/40 hover:text-slate-200 transition-all duration-200"
        routerLink="/reports"
        routerLinkActive="bg-indigo-600/10 border-indigo-500/20 text-indigo-400 font-semibold"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <span>Reports</span>
      </a>
    </div>

    <!-- AI Services Section -->
    <div class="space-y-1.5" *ngIf="!isAdmin()">
      <div class="px-3 text-xxs font-bold uppercase tracking-widest text-slate-500">AI Copilot</div>
      
      <!-- Career Bot Link -->
      <a
        class="flex items-center gap-3 rounded-xl border border-transparent px-3.5 py-2.5 text-sm font-medium text-slate-400 hover:bg-slate-900/40 hover:text-slate-200 transition-all duration-200"
        routerLink="/insights"
        routerLinkActive="bg-indigo-600/10 border-indigo-500/20 text-indigo-400 font-semibold"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
        <span>Career Bot</span>
      </a>
    </div>
  </nav>

  <!-- User Profile Section -->
  <div class="mt-auto pt-4 border-t border-slate-900 flex flex-col gap-3">
    @if (isAdmin()) {
      <div class="flex items-center gap-3 px-3 py-2">
        <!-- Avatar Circle -->
        <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 text-sm font-bold text-white shadow-md">
          {{ email().charAt(0).toUpperCase() }}
        </div>
        <!-- Email/Role info -->
        <div class="flex flex-col min-w-0">
          <span class="text-xs font-semibold text-slate-200 truncate">{{ email() }}</span>
          <span class="text-[10px] text-slate-500 font-medium mt-0.5 flex items-center gap-1.5">
            <span class="inline-block h-1.5 w-1.5 rounded-full bg-indigo-500"></span>
            Administrator
          </span>
        </div>
      </div>
    } @else {
      <div
        routerLink="/onboarding"
        class="group flex items-center justify-between gap-3 px-3 py-2 rounded-xl border border-transparent hover:border-slate-800 hover:bg-slate-900/30 cursor-pointer transition-all duration-150"
        title="Edit job preferences"
      >
        <div class="flex items-center gap-3 min-w-0 flex-1">
          <!-- Avatar Circle -->
          <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 text-sm font-bold text-white shadow-md">
            {{ email().charAt(0).toUpperCase() }}
          </div>
          <!-- Email/Role info -->
          <div class="flex flex-col min-w-0">
            <span class="text-xs font-semibold text-slate-200 truncate">{{ email() }}</span>
            <span class="text-[10px] text-slate-500 font-medium mt-0.5 flex items-center gap-1.5">
              <span class="inline-block h-1.5 w-1.5 rounded-full bg-slate-500"></span>
              Job Seeker
            </span>
          </div>
        </div>
        <!-- Edit Chevron Icon -->
        <svg class="h-4 w-4 text-slate-500 group-hover:text-slate-350 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </div>
    }

    <!-- Action Buttons (Explicit labels + icons) -->
    <div class="grid grid-cols-2 gap-2 mt-1">
      <!-- Switch Account button -->
      <button
        type="button"
        (click)="switchAccount()"
        class="flex items-center justify-center gap-2 rounded-xl border border-slate-900 bg-slate-900/40 py-2 px-3 text-xs font-semibold text-slate-300 hover:bg-slate-800 hover:text-white transition-all duration-155"
      >
        <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
        </svg>
        <span>Switch</span>
      </button>

      <!-- Logout button -->
      <button
        type="button"
        class="flex items-center justify-center gap-2 rounded-xl border border-slate-900 bg-slate-900/40 py-2 px-3 text-xs font-semibold text-slate-300 hover:bg-slate-800 hover:text-red-400 transition-all duration-150"
        (click)="logout()"
      >
        <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Logout</span>
      </button>
    </div>

    <!-- Status Badge -->
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-900/60 bg-slate-950 text-[10px] text-slate-500 font-medium">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
      </span>
      <span>Connected to Groq (Llama-3)</span>
    </div>
  </div>
</div>
